name: Bug report
description: 오류나 기대와 다른 동작을 보고합니다.
title: "[Bug] "
labels:
  - type:bug
  - status:needs-review
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - platform
        - dashboard
        - mcp
        - planning
        - design
        - gateway
        - shared
        - docs
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: 재현 절차를 작성해주세요.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: 기대한 동작은 무엇인가요?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: 실제 동작은 무엇인가요?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Browser:
        - Docker image/tag:
        - Railway/local:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
    validations:
      required: false
