name: Feature request
description: 기능 추가 또는 개선 작업을 제안합니다.
title: "[Feature] "
labels:
  - ✨ type:feature
  - 👀 status:needs-review
body:
  - type: markdown
    attributes:
      value: |
        기능 요청은 구현 전에 범위와 완료 조건을 명확히 하기 위한 작업 단위입니다.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: 어느 영역의 기능인가요?
      options:
        - platform
        - dashboard
        - mcp
        - planning
        - design
        - gateway
        - shared
        - docs
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Background / Problem
      description: 왜 이 기능이 필요한지 설명해주세요.
      placeholder: 현재 어떤 문제가 있고, 어떤 사용 시나리오를 해결해야 하나요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: 원하는 해결 방향을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 이번 작업에 포함할 것과 제외할 것을 구분해주세요.
      value: |
        포함:
        - 

        제외:
        - 
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료로 판단할 수 있는 조건을 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: 참고 링크, 스크린샷, 관련 이슈 등이 있으면 적어주세요.
    validations:
      required: false
